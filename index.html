<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body{
margin:0;
background:#06131f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:#fff;
}

.box{
background:#0d2233;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 15px #00eaff55;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
padding:10px;
width:100%;
background:#00eaff;
border:none;
cursor:pointer;
font-weight:bold;
}

.error{
color:red;
font-size:12px;
display:none;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 LOGIN ADMIN</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<div class="error" id="err">❌ Salah login</div>

<button onclick="login()">MASUK</button>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    localStorage.setItem("login","true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("err").style.display="block";
  }
}
</script>

</body>
</html>
