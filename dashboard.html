<!DOCTYPE html>
<html lang="id"><head>
  <meta charset="UTF-8">
  <title>Dashboard - admin</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1d2a;
      color: white;
      margin: 0;
    }
    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #132f4c;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      width: 100%;
      border: none;
      background: #00c3ff;
      color: black;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }
    #dashboard {
      display: none;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      background: #081826;
      padding: 15px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center" style="display: flex;">
  <div class="box">
    <h2>Login Dashboard</h2>
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display: none;">
  <div class="topbar">
    <div>Halo, <b id="username">admin</b></div>
    <button onclick="logout()">Logout</button>
  </div>

  <h1>result angka pasaran seluruh dunia</h1>
  <p>Selamat datang di dashboard.</p>
</div>

<script>
  // USER LOGIN (bisa kamu ganti)
  const USER = "admin";
  const PASS = "123";

  function login() {
    const user = document.getElementById('usernameInput').value;
    const pass = document.getElementById('passwordInput').value;

    if (user === USER && pass === PASS) {
      sessionStorage.setItem('loggedIn', 'true');
      sessionStorage.setItem('username', user);
      showDashboard();
    } else {
      document.getElementById('error').textContent = "Username atau password salah!";
    }
  }

  function logout() {
    sessionStorage.clear();
    location.reload();
  }

  function showDashboard() {
    const user = sessionStorage.getItem('username');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('username').textContent = user;
    document.title = "Dashboard - " + user;
  }

  // CEK SAAT HALAMAN DIBUKA
  if (sessionStorage.getItem('loggedIn')) {
    showDashboard();
  }
</script>


</body></html>
