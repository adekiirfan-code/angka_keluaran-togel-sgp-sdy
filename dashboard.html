<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1d2a;
      color: white;
      margin: 0;
    }
    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #132f4c;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      width: 100%;
      border: none;
      background: #00c3ff;
      color: black;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="box">
    <h2>Login Dashboard</h2>
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<script>
const USER = "admin";
const PASS = "123";

function login() {
  const user = document.getElementById('usernameInput').value;
  const pass = document.getElementById('passwordInput').value;

  if (user === USER && pass === PASS) {
    localStorage.setItem('username', user);
    window.location.href = "dashboard.html";
  } else {
    document.getElementById('error').textContent = "Username atau password salah!";
  }
}
</script>

</body>
</html>
